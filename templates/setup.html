<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup Toko — UMKM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f6fa; color: #1e1e2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.logo { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.logo span { color: #4f6ef7; }
.sub { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 24px; }
.section-title { font-size: 12px; font-weight: 700; color: #4f6ef7; text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #eef0f7; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.field input { width: 100%; background: #f5f6fa; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 11px 14px; color: #1e1e2e; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
.field input:focus { border-color: #4f6ef7; background: #fff; }
.btn { width: 100%; padding: 13px; border-radius: 10px; background: #4f6ef7; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600; border: none; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
.btn:hover { background: #3d5ce5; }
.error { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.2); color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: none; }
.success { background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.2); color: #059669; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: none; }
.step { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.step-dot.active { background: #4f6ef7; color: #fff; }
.step-dot.done { background: #059669; color: #fff; }
.step-dot.inactive { background: #eef0f7; color: #9ca3af; }
.step-line { flex: 1; height: 2px; background: #eef0f7; }
.step-line.done { background: #059669; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">UMKM<span>Pro</span></div>
  <div class="sub">Setup toko Anda — hanya sekali!</div>
  <div class="step">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line" id="line1"></div>
    <div class="step-dot inactive" id="dot2">2</div>
  </div>
  <div class="error" id="error-msg"></div>
  <div class="success" id="success-msg"></div>
  <div id="step1">
    <div class="section-title">🏪 Informasi Toko</div>
    <div class="field"><label>Nama Toko *</label><input id="nama_toko" placeholder="Contoh: Toko Maju Jaya" /></div>
    <div class="field"><label>Alamat Toko</label><input id="alamat" placeholder="Contoh: Jl. Sudirman No. 1, Jakarta" /></div>
    <div class="field"><label>Nomor Telepon Toko</label><input id="telepon" placeholder="Contoh: 08123456789" /></div>
    <div class="field"><label>Email Toko</label><input id="email" placeholder="Contoh: toko@email.com" /></div>
    <button class="btn" onclick="nextStep()">Lanjut →</button>
  </div>
  <div id="step2" style="display:none;">
    <div class="section-title">👤 Akun Owner</div>
    <div class="field"><label>Nama Lengkap *</label><input id="nama_owner" placeholder="Contoh: Budi Santoso" /></div>
    <div class="field"><label>Username *</label><input id="username" placeholder="Contoh: owner_budi" /></div>
    <div class="field"><label>Password *</label><input id="password" type="password" placeholder="Min. 6 karakter" /></div>
    <div class="field"><label>Konfirmasi Password *</label><input id="password2" type="password" placeholder="Ulangi password" /></div>
    <button class="btn" onclick="simpanSetup()">✅ Selesai & Mulai</button>
  </div>
</div>
<script>
function nextStep() {
  var nama_toko = document.getElementById('nama_toko').value;
  var err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!nama_toko) { err.textContent = 'Nama toko wajib diisi!'; err.style.display = 'block'; return; }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('dot1').className = 'step-dot done';
  document.getElementById('dot1').textContent = '✓';
  document.getElementById('line1').className = 'step-line done';
  document.getElementById('dot2').className = 'step-dot active';
}
async function simpanSetup() {
  var nama_owner = document.getElementById('nama_owner').value;
  var username = document.getElementById('username').value;
  var password = document.getElementById('password').value;
  var password2 = document.getElementById('password2').value;
  var err = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!nama_owner || !username || !password) { err.textContent = 'Semua field wajib diisi!'; err.style.display = 'block'; return; }
  if (password.length < 6) { err.textContent = 'Password minimal 6 karakter!'; err.style.display = 'block'; return; }
  if (password !== password2) { err.textContent = 'Password tidak cocok!'; err.style.display = 'block'; return; }
  var res = await fetch('/setup', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      nama_toko: document.getElementById('nama_toko').value,
      alamat: document.getElementById('alamat').value,
      telepon: document.getElementById('telepon').value,
      email: document.getElementById('email').value,
      nama_owner: nama_owner,
      username: username,
      password: password
    })
  });
  var d = await res.json();
  if (d.ok) {
    var s = document.getElementById('success-msg');
    s.textContent = 'Setup berhasil! Mengalihkan ke halaman login...';
    s.style.display = 'block';
    setTimeout(function(){ window.location.href = '/login'; }, 2000);
  } else {
    err.textContent = d.error || 'Terjadi kesalahan';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
